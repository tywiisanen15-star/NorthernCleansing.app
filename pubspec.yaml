name: northern_cleansing
description: Professional cleaning and handy work scheduling app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & State Management
  provider: ^6.0.0
  flutter_riverpod: ^2.4.0
  
  # Navigation
  go_router: ^11.0.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # API & Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Firebase (optional - for notifications)
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  
  # UI Components
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.0
  flutter_rating_bar: ^4.0.1
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  
  # Payment (optional)
  stripe_flutter: ^10.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
